<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=430, initial-scale=1">
    <title>TabGuard</title>
    <style>
      html,
      body {
        width: 430px;
        min-width: 430px;
        margin: 0;
      }

      .shell {
        width: 430px;
        min-width: 430px;
      }
    </style>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brandBlock">
          <div class="brandLine">
            <h1>TabGuard</h1>
            <span id="pageCount" class="pageCount">0</span>
          </div>
          <p class="tagline">Tab稍后读</p>
        </div>
        <div class="topActions">
          <button id="saveCurrent" class="primary" type="button">
            <svg class="buttonIcon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"></path>
            </svg>
            <span>保存页面</span>
          </button>
          <button id="openSettings" class="iconButton" type="button" aria-label="设置" title="设置">
            <svg class="buttonIcon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2 2 0 1 1-4 0v-.09a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2 2 0 1 1-2.83-2.83l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.66-1.1H3a2 2 0 1 1 0-4h.09A1.8 1.8 0 0 0 4.75 8.8a1.8 1.8 0 0 0-.36-1.98l-.05-.05a2 2 0 1 1 2.83-2.83l.05.05A1.8 1.8 0 0 0 9.2 4.6a1.8 1.8 0 0 0 1.1-1.66V3a2 2 0 1 1 4 0v.09a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1H21a2 2 0 1 1 0 4h-.09A1.8 1.8 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="filters">
        <label class="searchBox">
          <svg class="searchIcon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35"></path>
            <circle cx="11" cy="11" r="6"></circle>
          </svg>
          <input id="searchInput" type="search" placeholder="搜索标题、摘要或网址">
        </label>
        <div id="categoryTabs" class="categoryTabs" role="tablist" aria-label="分类"></div>
      </section>

      <section id="emptyState" class="emptyState" hidden>
        <div class="emptyMark" aria-hidden="true">□</div>
        <h2>清单是空的</h2>
        <p>保存页面后，它会出现在这里。</p>
      </section>

      <section id="pageList" class="pageList" aria-live="polite"></section>

      <footer class="bulkBar">
        <label class="selectAll">
          <input id="selectAll" type="checkbox">
          <span>全选</span>
        </label>
        <button id="deleteSelected" class="ghost" type="button" disabled>删除选中</button>
        <button id="clearExpired" class="ghost" type="button">清空过期</button>
      </footer>
    </main>

    <script src="lib/utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
